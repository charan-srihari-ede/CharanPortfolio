<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-title {
    text-decoration: none;
    color: inherit;
    display: block;
    text-align: center;
    cursor: pointer;
}

.login-title:hover {
    color: var(--accent);
}
    </style>
</head>

<body class="auth-body">
    <div class="login-wrapper glass-card">
        <a href="index.html" class="login-title">
    <h2>Admin Authentication</h2>
</a>
        <form id="login-form">
            <div class="form-group">
                <input type="email" id="login-email" placeholder="Admin Email" required>
            </div>
            <div class="form-group">
                <input type="password" id="login-password" placeholder="Password" required>
            </div>
            <button type="submit" class="submit-btn" id="login-btn">Secure Login</button>
        </form>
        <p id="error-message" class="err-text"></p>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>

</html>
